<!DOCTYPE html>
<html lang="zh-TW" data-bs-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>🍁Astar RaidBoss 招募牆 & 公會成員清單🍁-0923</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <!-- PapaParse -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <style>
    body { overflow-y: scroll; margin: 0; padding: 0; }
    .group-row { background: rgba(0,0,0,.03); font-weight: 600; }
    .title{font-weight:bold; font-size:1.0rem;}
    .reset-content { display: table-cell; line-height: 1.5; font-size: 1rem; padding: 0.5; border: none; }
    [data-bs-theme="dark"] .card{ border-color: rgba(255,255,255,.12); }
    .badge-guild{ color:#fff; font-weight:800; border:0; background:#198754; }
    #editOverlay { z-index: 9999; }

    /* 分頁按鈕色系 */
    .nav-tabs-custom .nav-link{ border:2px solid transparent; font-weight:700; margin-right:.5rem; }
    .nav-tabs-custom .nav-link:hover{ opacity:.9; }
    .nav-tabs-custom .tab-astar{ color:#0d6efd; border-color:#0d6efd; }
    .nav-tabs-custom .tab-astar.active{ color:#fff; background:#0d6efd; }
    .nav-tabs-custom .tab-mtez{ color:#fd7e14; border-color:#fd7e14; }
    .nav-tabs-custom .tab-mtez.active{ color:#fff; background:#fd7e14; }
  </style>
</head>

<body class="bg-body">
  <nav class="navbar navbar-expand-lg bg-primary navbar-dark sticky-top" style="padding:3px">
    <div class="container-fluid">
      <span class="navbar-brand btn-sm title" style="font-size:1.25rem;">🍁Astar RaidBoss 招募牆 & 公會成員清單🍁</span>
      <div class="ms-auto d-flex align-items-center gap-2">
        <button id="btnGoRecruit" class="btn btn-outline-light btn-sm title">📣 招募牆</button>
        <button id="btnGoMembers" class="btn btn-outline-light btn-sm title">👥 公會成員</button>
        <button id="toggleTheme" class="btn btn-outline-light btn-sm title">🌙 夜間模式</button>
      </div>
    </div>
  </nav>

  <!-- 招募牆（你若已有完整招募牆程式，直接替換這個區塊即可） -->
  <div id="RecruitPage" class="container py-4">
    <div class="card shadow-sm">
      <div class="card-body">
        <h4 class="card-title mb-2">📣 招募牆（此頁可保留你原本版本）</h4>
        <div class="text-muted">本次修改重點在「公會成員」分頁與權限控制。</div>
      </div>
    </div>
  </div>

  <!-- 公會成員 -->
  <div id="MembersPage" class="container py-4 d-none">
    <div class="d-flex align-items-center justify-content-between mb-2">
      <h3 class="mb-0"><b>👥 公會成員清單</b></h3>
    </div>

    <div class="card shadow-sm mb-3">
      <div class="card-body">
        <div class="d-flex align-items-center gap-2 flex-wrap">
          <div class="text-muted">
            ✅ ASTAR / MTEZ 分頁顯示。ASTAR 唯讀；只有 MTEZ 可新增/修改。
          </div>
        </div>
        <div id="membersMsg" class="text-danger mt-2"></div>
      </div>
    </div>

    <!-- 分頁按鈕 -->
    <ul class="nav nav-pills nav-tabs-custom mb-3" id="guildTabs" role="tablist">
      <li class="nav-item" role="presentation">
        <button id="tabAstar" class="nav-link tab-astar" type="button" role="tab">ASTAR（唯讀）</button>
      </li>
      <li class="nav-item" role="presentation">
        <button id="tabMtez" class="nav-link tab-mtez active" type="button" role="tab">MTEZ（可編輯）</button>
      </li>
    </ul>

    <div class="card shadow-sm">
      <div class="card-body">
        <div class="d-flex align-items-center mb-2">
          <h4 class="card-title mb-2 mb-sm-0" id="guildTitle">🏋️ MTEZ 成員</h4>

          <div class="d-flex align-items-center gap-2 flex-wrap ms-auto" style="min-width:0;">
            <!-- ✅ 只在 MTEZ 顯示 -->
            <button id="btnAddMember" class="btn btn-success btn-sm">新增成員</button>

            <input id="memberSearchInput" type="text" class="form-control w-auto" placeholder="搜尋：角色/代碼/職業/備註" style="min-width:0;">
            <button id="memberSearchBtn" class="btn btn-outline-secondary btn-sm">搜尋</button>
            <button id="btnReloadMembers" class="btn btn-outline-secondary btn-sm">重新整理</button>
          </div>
        </div>

        <div class="table-responsive">
          <table class="table table-striped table-hover align-middle reset-content">
            <thead class="table-secondary">
              <tr>
                <th style="width: 18%;">角色名稱</th>
                <th style="width: 12%;">角色代碼</th>
                <th style="width: 18%;">角色職業</th>
                <th style="width: 10%;">角色等級</th>
                <th style="width: 10%;">角色乾表</th>
                <th style="width: 12%;">公會</th>
                <th style="width: 20%;">備註</th>
                <th style="width: 8%;">修改</th>
              </tr>
            </thead>
            <tbody id="memberTableBody">
              <tr><td colspan="8" class="text-center text-muted">尚未讀取資料</td></tr>
            </tbody>
          </table>
        </div>

      </div>
    </div>
  </div>

<script>
/* =========================
   ✅ GAS / Sheet 設定
========================= */
// ASTAR（讀取 gid=0；欄位：B/C/D/E/G/K）
const ASTAR_SHEET_URL = 'https://docs.google.com/spreadsheets/d/1-j04395CPwDlZnJ2vUt3k4wsT5rPHgQWmujSQCi76Fs/edit?gid=0#gid=0';

// MTEZ（讀取 gid=1449952622；欄位：B/C/D/E/G/K）
const MTEZ_SHEET_URL  = 'https://docs.google.com/spreadsheets/d/1-j04395CPwDlZnJ2vUt3k4wsT5rPHgQWmujSQCi76Fs/edit?gid=1449952622#gid=1449952622';

// ✅ MTEZ 寫回 GAS（你提供的）
const GAS_MTEZ_URL = 'https://script.google.com/macros/s/AKfycbywkvtNs2_j3DdKkuvFsiV6oDcQ7D8r6WcdlSRtvHQSOlH5LBty93KUXiGwynqduOzx/exec';
const GAS_MTEZ_ACTION = 'upsertMtezByCode';

// ASTAR 不允許修改：不需要 GAS

/* =========================
   工具
========================= */
function parseSheetFromUrl(url) {
  if (!url) return null;
  const idMatch = url.match(/\/d\/([a-zA-Z0-9-_]+)/);
  if (!idMatch) return null;
  const sheetId = idMatch[1];
  const urlObj = new URL(url);
  const gid = urlObj.searchParams.get('gid') || (url.includes('#gid=') ? url.split('#gid=')[1] : '0');
  return { sheetId, gid };
}
function csvUrl(sheetId, gid){ return `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&gid=${gid}`; }
function safeText(x){ return (x === null || x === undefined) ? '' : String(x); }
function nowISO(){ return new Date().toISOString(); }

/* =========================
   夜間模式
========================= */
$('#toggleTheme').on('click', function () {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-bs-theme') === 'dark';
  html.setAttribute('data-bs-theme', isDark ? 'light' : 'dark');
  $(this).text(isDark ? '🌙 夜間模式' : '☀️ 日間模式');
});

/* =========================
   分頁切換（招募牆 / 成員）
========================= */
function showMainPage(page){
  const isRecruit = (page === 'recruit');
  $('#RecruitPage').toggleClass('d-none', !isRecruit);
  $('#MembersPage').toggleClass('d-none', isRecruit);
}
$('#btnGoRecruit').on('click', ()=>showMainPage('recruit'));
$('#btnGoMembers').on('click', ()=>showMainPage('members'));

/* =========================
   成員資料
========================= */
let currentGuildTab = 'MTEZ'; // 預設顯示 MTEZ
let astarMembers = [];
let mtezMembers  = [];

const MEMBER_MAPPING = { name:1, code:2, job:3, level:4, attack:6, note:10 }; // B/C/D/E/G/K

function mapRowToMember(row, guild){
  return {
    name:   safeText(row[MEMBER_MAPPING.name]).trim(),
    code:   safeText(row[MEMBER_MAPPING.code]).trim(),
    job:    safeText(row[MEMBER_MAPPING.job]).trim(),
    level:  safeText(row[MEMBER_MAPPING.level]).trim(),
    attack: safeText(row[MEMBER_MAPPING.attack]).trim(),
    note:   safeText(row[MEMBER_MAPPING.note]).trim(),
    guild
  };
}

function loadMembersFromSheet(sheetUrl, guild){
  return new Promise((resolve, reject)=>{
    const t = parseSheetFromUrl(sheetUrl);
    if (!t?.sheetId) return reject(new Error(`無法解析 sheetId：${guild}`));

    Papa.parse(csvUrl(t.sheetId, t.gid), {
      download: true,
      skipEmptyLines: true,
      complete: (res)=>{
        try{
          if (!res.data || res.data.length < 2) return resolve([]);
          const rows = res.data.slice(1);
          const out = rows.map(r=>mapRowToMember(r, guild)).filter(x=>x.name || x.code);
          resolve(out);
        }catch(e){ reject(e); }
      },
      error: (err)=>reject(err)
    });
  });
}

async function reloadMembers(){
  $('#membersMsg').text('');
  $('#memberTableBody').html(`<tr><td colspan="8" class="text-center text-muted">讀取中...</td></tr>`);
  try{
    const [a, m] = await Promise.all([
      loadMembersFromSheet(ASTAR_SHEET_URL, 'ASTAR'),
      loadMembersFromSheet(MTEZ_SHEET_URL, 'MTEZ')
    ]);
    astarMembers = a;
    mtezMembers = m;
    renderMemberTable();
  }catch(e){
    console.error(e);
    $('#membersMsg').text('讀取失敗：' + (e?.message || e));
    $('#memberTableBody').html(`<tr><td colspan="8" class="text-center text-muted">讀取失敗</td></tr>`);
  }
}

function getCurrentMembers(){
  const src = (currentGuildTab === 'ASTAR') ? astarMembers : mtezMembers;
  const kw = $('#memberSearchInput').val().trim().toLowerCase();
  if (!kw) return src;

  return src.filter(r=>{
    const blob = [r.name,r.code,r.job,r.level,r.attack,r.note].map(x=>safeText(x).toLowerCase()).join(' ');
    return blob.includes(kw);
  });
}

function renderMemberTable(){
  // tab ui
  $('#tabAstar').toggleClass('active', currentGuildTab === 'ASTAR');
  $('#tabMtez').toggleClass('active', currentGuildTab === 'MTEZ');

  // title + button visibility
  $('#guildTitle').text(currentGuildTab === 'ASTAR' ? '🏋️ ASTAR 成員（唯讀）' : '🏋️ MTEZ 成員（可編輯）');
  $('#btnAddMember').toggle(currentGuildTab === 'MTEZ'); // ✅ 只 MTEZ 可新增

  const rows = getCurrentMembers();
  if (!rows.length){
    $('#memberTableBody').html(`<tr><td colspan="8" class="text-center text-muted">沒有資料</td></tr>`);
    return;
  }

  const canEdit = (currentGuildTab === 'MTEZ'); // ✅ 只有 MTEZ 顯示修改按鈕

  const html = rows.map(r=>`
    <tr>
      <td>${safeText(r.name)}</td>
      <td class="font-monospace">${safeText(r.code)}</td>
      <td>${safeText(r.job)}</td>
      <td>${safeText(r.level)}</td>
      <td>${safeText(r.attack)}</td>
      <td><span class="badge badge-guild">${safeText(r.guild)}</span></td>
      <td class="small">${safeText(r.note) || '<span class="text-muted">—</span>'}</td>
      <td>
        ${
          canEdit
          ? `<button class="btn btn-outline-secondary btn-sm btn-edit-member"
                data-name="${safeText(r.name).replace(/"/g,'&quot;')}"
                data-code="${safeText(r.code).replace(/"/g,'&quot;')}"
                data-job="${safeText(r.job).replace(/"/g,'&quot;')}"
                data-level="${safeText(r.level).replace(/"/g,'&quot;')}"
                data-attack="${safeText(r.attack).replace(/"/g,'&quot;')}"
                data-note="${safeText(r.note).replace(/"/g,'&quot;')}">修改</button>`
          : `<span class="text-muted">—</span>`
        }
      </td>
    </tr>
  `).join('');
  $('#memberTableBody').html(html);
}

/* tabs */
$('#tabAstar').on('click', ()=>{ currentGuildTab='ASTAR'; renderMemberTable(); });
$('#tabMtez').on('click', ()=>{ currentGuildTab='MTEZ'; renderMemberTable(); });

/* search / reload */
$('#memberSearchBtn').on('click', renderMemberTable);
$('#memberSearchInput').on('keypress', (e)=>{ if (e.which===13) renderMemberTable(); });
$('#btnReloadMembers').on('click', reloadMembers);

/* =========================
   Editor Overlay（MTEZ only）
========================= */
function createEditor(titleText, fieldsHtml){
  const overlay = document.createElement('div');
  overlay.id = 'editOverlay';
  Object.assign(overlay.style, {
    position:'fixed', inset:0, background:'rgba(0,0,0,.4)',
    display:'flex', alignItems:'center', justifyContent:'center', zIndex:9999
  });

  const card = document.createElement('div');
  Object.assign(card.style, {
    position:'relative', background:'#fff', borderRadius:'12px', padding:'18px',
    width:'min(720px, 92vw)', boxShadow:'0 10px 30px rgba(0,0,0,.2)', color:'#222',
    fontFamily:'system-ui,-apple-system,BlinkMacSystemFont'
  });

  card.innerHTML = `
    <h3 style="margin:0 0 12px;font-size:18px;">${titleText}</h3>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">${fieldsHtml}</div>
    <div class="d-flex gap-2 justify-content-end mt-3">
      <button id="btn_cancel" class="btn btn-light border">取消</button>
      <button id="btn_save" class="btn btn-primary">儲存</button>
    </div>
    <div id="editLoadingMask" style="
      display:none; position:absolute; inset:0; background:rgba(255,255,255,.75);
      border-radius:12px; z-index:10; backdrop-filter:saturate(180%) blur(2px);
      align-items:center; justify-content:center;">
      <div class="text-center">
        <div class="spinner-border text-primary" role="status" aria-hidden="true"></div>
        <div class="mt-2 fw-semibold">處理中，請稍候…</div>
      </div>
    </div>
  `;
  overlay.appendChild(card);
  document.body.appendChild(overlay);
  return overlay;
}
function setBusy(overlay, busy){
  const mask = overlay.querySelector('#editLoadingMask');
  const btnSave = overlay.querySelector('#btn_save');
  const btnCancel = overlay.querySelector('#btn_cancel');
  mask.style.display = busy ? 'flex' : 'none';
  btnSave.disabled = busy;
  btnCancel.disabled = busy;
  overlay.querySelectorAll('input, textarea').forEach(el => el.disabled = busy);
  if (busy){
    btnSave.dataset._orig = btnSave.innerHTML;
    btnSave.innerHTML = `儲存中… <span class="spinner-border spinner-border-sm ms-1" role="status" aria-hidden="true"></span>`;
  } else if (btnSave.dataset._orig){
    btnSave.innerHTML = btnSave.dataset._orig;
    delete btnSave.dataset._orig;
  }
}

/* MTEZ editor */
function openMtezEditor(values){
  const isNew = !!values.__isNew;
  const overlay = createEditor(isNew ? '新增 MTEZ 成員' : '修改 MTEZ 成員', `
    <label style="display:flex;flex-direction:column;gap:6px;">
      <span>角色名稱（B）</span>
      <input id="m_name" type="text" class="form-control">
    </label>
    <label style="display:flex;flex-direction:column;gap:6px;">
      <span>角色代碼（C，主鍵）</span>
      <input id="m_code" type="text" class="form-control">
    </label>
    <label style="display:flex;flex-direction:column;gap:6px;">
      <span>角色職業（D）</span>
      <input id="m_job" type="text" class="form-control">
    </label>
    <label style="display:flex;flex-direction:column;gap:6px;">
      <span>角色等級（E）</span>
      <input id="m_level" type="text" class="form-control">
    </label>
    <label style="display:flex;flex-direction:column;gap:6px;">
      <span>角色乾表（G）</span>
      <input id="m_attack" type="text" class="form-control">
    </label>
    <label style="grid-column:1 / -1; display:flex;flex-direction:column;gap:6px;">
      <span>備註（K）</span>
      <textarea id="m_note" class="form-control" rows="3"></textarea>
    </label>
  `);

  overlay.querySelector('#m_name').value = values.name || '';
  overlay.querySelector('#m_code').value = values.code || '';
  overlay.querySelector('#m_job').value = values.job || '';
  overlay.querySelector('#m_level').value = values.level || '';
  overlay.querySelector('#m_attack').value = values.attack || '';
  overlay.querySelector('#m_note').value = values.note || '';

  const close = ()=>overlay.remove();
  overlay.querySelector('#btn_cancel').onclick = ()=>close();

  overlay.querySelector('#btn_save').onclick = async ()=>{
    const payload = {
      action: GAS_MTEZ_ACTION,
      name: overlay.querySelector('#m_name').value.trim(),
      code: overlay.querySelector('#m_code').value.trim(),
      job: overlay.querySelector('#m_job').value.trim(),
      level: overlay.querySelector('#m_level').value.trim(),
      attack: overlay.querySelector('#m_attack').value.trim(),
      note: overlay.querySelector('#m_note').value.trim(),
      updatedAt: nowISO()
    };

    if (!payload.code){
      alert('角色代碼不可為空（主鍵 / C 欄）');
      return;
    }

    try{
      setBusy(overlay, true);

      const form = new URLSearchParams();
      Object.entries(payload).forEach(([k,v])=> form.set(k, safeText(v)));

      const resp = await fetch(GAS_MTEZ_URL, {
        method:'POST',
        headers:{ 'Content-Type':'application/x-www-form-urlencoded;charset=UTF-8' },
        body: form.toString(),
        cache:'no-store'
      });

      const text = await resp.text();
      let json; try{ json = JSON.parse(text); } catch { throw new Error('MTEZ GAS 回傳非 JSON'); }
      if (!resp.ok || json.status !== 'ok') throw new Error(json.message || '寫入失敗');

      alert(isNew ? '新增成功！' : '更新成功！');
      close();
      await reloadMembers();
      currentGuildTab = 'MTEZ';
      renderMemberTable();
    }catch(e){
      console.error(e);
      alert('送出失敗：' + e.message);
      setBusy(overlay, false);
    }
  };
}

/* add/edit only for MTEZ */
$('#btnAddMember').on('click', ()=>openMtezEditor({__isNew:true}));
$(document).on('click', '.btn-edit-member', function(){
  openMtezEditor({
    __isNew:false,
    name: $(this).data('name'),
    code: $(this).data('code'),
    job: $(this).data('job'),
    level: $(this).data('level'),
    attack: $(this).data('attack'),
    note: $(this).data('note')
  });
});

/* init */
$(function(){
  // 先進成員頁預設顯示 MTEZ
  showMainPage('members');
  reloadMembers();
});
</script>
</body>
</html>

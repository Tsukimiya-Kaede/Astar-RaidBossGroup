<script>
/* =========================
   ✅ 你需要先設定的參數
========================= */
const RECRUIT_SHEET_URL = 'https://docs.google.com/spreadsheets/d/REPLACE_ME/edit?gid=0#gid=0';
const GAS_RECRUIT_URL   = 'https://script.google.com/macros/s/REPLACE_ME/exec';

// ✅ MTEZ GAS（你提供的）
const GAS_MTEZ_URL = 'https://script.google.com/macros/s/AKfycbywkvtNs2_j3DdKkuvFsiV6oDcQ7D8r6WcdlSRtvHQSOlH5LBty93KUXiGwynqduOzx/exec';

// ✅ ASTAR GAS（你原本那支，如果不是請自行換成你的 /exec）
const GAS_ASTAR_URL = 'https://script.google.com/macros/s/AKfycbwAAMocuEMv_Q1xbEqP7yykZ61Wvo-8v_aMDvzyDjrxHtBFtS2MDYr1rTXZfRUaAfL8/exec';

/* =========================
   ✅ 跨公會名單：兩個來源
========================= */
const CROSS_SOURCES = [
  // ASTAR：gid=0（B/C/D/E/G/J/K）
  {
    label: 'ASTAR',
    sheetUrl: 'https://docs.google.com/spreadsheets/d/1-j04395CPwDlZnJ2vUt3k4wsT5rPHgQWmujSQCi76Fs/edit?gid=0#gid=0',
    schema: 'guild_member',
    writable: true,
    gasUrl: GAS_ASTAR_URL,
    action: 'upsertByCode',
    mapping: { name:1, code:2, job:3, level:4, attack:6, camp:9, note:10 },
    fixedGuild: 'ASTAR'
  },
  // MTEZ：gid=1449952622（B/C/D/E/G/K）✅ 已改成正確欄位
  {
    label: 'MTEZ',
    sheetUrl: 'https://docs.google.com/spreadsheets/d/1-j04395CPwDlZnJ2vUt3k4wsT5rPHgQWmujSQCi76Fs/edit?gid=1449952622#gid=1449952622',
    schema: 'guild_member',
    writable: true,
    gasUrl: GAS_MTEZ_URL,
    action: 'upsertMtezByCode',  // ✅ 新 GAS action（下面我有給你 GAS 程式碼）
    mapping: { name:1, code:2, job:3, level:4, attack:6, note:10 },
    fixedGuild: 'MTEZ'
  }
];

/* =========================
   工具
========================= */
function parseSheetFromUrl(url) {
  if (!url) return null;
  const idMatch = url.match(/\/d\/([a-zA-Z0-9-_]+)/);
  if (!idMatch) return null;
  const sheetId = idMatch[1];
  const urlObj = new URL(url);
  const gid = urlObj.searchParams.get('gid') || (url.includes('#gid=') ? url.split('#gid=')[1] : '0');
  return { sheetId, gid };
}
function csvUrl(sheetId, gid){ return `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&gid=${gid}`; }
function safeText(x){ return (x === null || x === undefined) ? '' : String(x); }
function nowISO(){ return new Date().toISOString(); }

/* =========================
   夜間模式
========================= */
$('#toggleTheme').on('click', function () {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-bs-theme') === 'dark';
  html.setAttribute('data-bs-theme', isDark ? 'light' : 'dark');
  $(this).text(isDark ? '🌙 夜間模式' : '☀️ 日間模式');
});

/* =========================
   分頁切換
========================= */
function showPage(page){
  const isRecruit = (page === 'recruit');
  $('#RecruitPage').toggleClass('d-none', !isRecruit);
  $('#CrossPage').toggleClass('d-none', isRecruit);
}
$('#btnGoRecruit').on('click', ()=>showPage('recruit'));
$('#btnGoCross').on('click', ()=>showPage('cross'));

/* =========================
   全域狀態
========================= */
let crossData   = [];
let recruitTarget = null;

/* =========================
   （略）招募牆區塊：你原本的 loadRecruit/renderRecruitWall 等
   這段你可維持既有版本，我這次重點在「成員清單」。
========================= */
// 你如果需要，我也可以把招募牆完整補回來（目前為避免篇幅，略過）。


/* =========================
   Editor Overlay（通用）
========================= */
function createEditor(titleText, fieldsHtml){
  const overlay = document.createElement('div');
  overlay.id = 'editOverlay';
  Object.assign(overlay.style, { position: 'fixed', inset: 0, background: 'rgba(0,0,0,.4)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 9999 });

  const card = document.createElement('div');
  Object.assign(card.style, { position: 'relative', background: '#fff', borderRadius: '12px', padding: '18px', width: 'min(760px, 92vw)', boxShadow: '0 10px 30px rgba(0,0,0,.2)', color: '#222', fontFamily: 'system-ui,-apple-system,BlinkMacSystemFont' });

  card.innerHTML = `
    <h3 style="margin:0 0 12px;font-size:18px;">${titleText}</h3>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
      ${fieldsHtml}
    </div>
    <div class="d-flex gap-2 justify-content-end mt-3">
      <button id="btn_cancel" class="btn btn-light border">取消</button>
      <button id="btn_save" class="btn btn-primary">儲存</button>
    </div>
    <div id="editLoadingMask" style="
      display:none; position:absolute; inset:0; background:rgba(255,255,255,.75);
      border-radius:12px; z-index:10; backdrop-filter:saturate(180%) blur(2px);
      align-items:center; justify-content:center;">
      <div class="text-center">
        <div class="spinner-border text-primary" role="status" aria-hidden="true"></div>
        <div class="mt-2 fw-semibold">處理中，請稍候…</div>
      </div>
    </div>
  `;
  overlay.appendChild(card);
  document.body.appendChild(overlay);
  return overlay;
}
function setBusy(overlay, busy){
  const mask = overlay.querySelector('#editLoadingMask');
  const btnSave = overlay.querySelector('#btn_save');
  const btnCancel = overlay.querySelector('#btn_cancel');
  mask.style.display = busy ? 'flex' : 'none';
  btnSave.disabled = busy;
  btnCancel.disabled = busy;
  overlay.querySelectorAll('input, select, textarea').forEach(el => el.disabled = busy);
  if (busy){
    btnSave.dataset._orig = btnSave.innerHTML;
    btnSave.innerHTML = `儲存中… <span class="spinner-border spinner-border-sm ms-1" role="status" aria-hidden="true"></span>`;
  } else if (btnSave.dataset._orig){
    btnSave.innerHTML = btnSave.dataset._orig;
    delete btnSave.dataset._orig;
  }
}

/* =========================
   成員清單：讀取（ASTAR / MTEZ 都用同 schema：B/C/D/E/G/K）
========================= */
function loadCrossFromOneSource(src){
  return new Promise((resolve, reject)=>{
    const t = parseSheetFromUrl(src.sheetUrl);
    if (!t?.sheetId) return reject(new Error(`無法解析 sheetId：${src.label}`));

    Papa.parse(csvUrl(t.sheetId, t.gid), {
      download: true,
      skipEmptyLines: true,
      complete: (res) => {
        try{
          if (!res.data || res.data.length < 2) return resolve([]);
          const rows = res.data.slice(1);
          const m = src.mapping;

          const out = rows.map((r,i)=>({
            name:   safeText(r[m.name]).trim(),
            code:   safeText(r[m.code]).trim(),
            job:    safeText(r[m.job]).trim(),
            level:  safeText(r[m.level]).trim(),
            attack: safeText(r[m.attack]).trim(),
            guild:  safeText(src.fixedGuild || src.label || '').trim(),
            note:   safeText(r[m.note]).trim(),
            camp:   (m.camp !== undefined) ? safeText(r[m.camp]).trim() : '',
            rowIndex: i + 2,
            __source: src.label
          })).filter(x => x && (x.name || x.code));

          resolve(out);
        }catch(e){ reject(e); }
      },
      error: (err)=>reject(err)
    });
  });
}

async function loadCross(){
  $('#crossMsg').text('');
  $('#crossTableBody').html(`<tr><td colspan="8" class="text-center text-muted">讀取中...</td></tr>`);
  try{
    const results = await Promise.all((CROSS_SOURCES||[]).map(loadCrossFromOneSource));
    const merged = results.flat();

    // 以 code 去重（同 code 後者覆蓋前者）
    const byCode = new Map();
    for (const r of merged){
      const key = safeText(r.code).trim();
      if (!key) continue;
      byCode.set(key, r);
    }

    crossData = Array.from(byCode.values());
    $('#crossMsg').text(`已載入 ${CROSS_SOURCES.length} 份資料來源，共 ${crossData.length} 筆（依角色代碼去重）`);
    renderCrossTable(crossData);
  }catch(e){
    console.error(e);
    $('#crossMsg').text('讀取失敗：' + (e?.message || e));
    crossData = [];
    renderCrossTable(crossData);
  }
}

/* =========================
   成員清單：搜尋 + 分組
========================= */
function applyCrossSearch(data){
  const kw = $('#crossSearchInput').val().trim().toLowerCase();
  if (!kw) return data || [];
  return (data||[]).filter(r=>{
    const blob = [r.name,r.code,r.job,r.level,r.attack,r.guild,r.note,(r.camp||'')].map(x=>safeText(x).toLowerCase()).join(' ');
    return blob.includes(kw);
  });
}

function renderCrossTable(data){
  const filtered = applyCrossSearch(data);
  if (!filtered.length){
    $('#crossTableBody').html(`<tr><td colspan="8" class="text-center text-muted">沒有符合的資料</td></tr>`);
    return;
  }

  const groups = {};
  filtered.forEach(r=>{
    const k = safeText(r.guild).trim() || '未填寫公會';
    if (!groups[k]) groups[k] = [];
    groups[k].push(r);
  });

  const orderedKeys = Object.keys(groups).sort((a,b)=>a.localeCompare(b,'zh-Hant'));

  let html = '';
  orderedKeys.forEach(k=>{
    html += `<tr class="group-row"><td colspan="8">公會：${k}（${groups[k].length}）</td></tr>`;
    html += groups[k].map(r=>`
      <tr>
        <td>${safeText(r.name)||''}</td>
        <td class="font-monospace">${safeText(r.code)||''}</td>
        <td>${safeText(r.job)||''}</td>
        <td>${safeText(r.level)||''}</td>
        <td>${safeText(r.attack)||''}</td>
        <td><span class="badge badge-guild">${safeText(r.guild)||'—'}</span></td>
        <td class="small">${safeText(r.note)||'<span class="text-muted">—</span>'}</td>
        <td>
          <button class="btn btn-outline-secondary btn-sm btn-edit-cross"
            data-source="${safeText(r.__source||'').replace(/"/g,'&quot;')}"
            data-guild="${safeText(r.guild||'').replace(/"/g,'&quot;')}"
            data-name="${safeText(r.name).replace(/"/g,'&quot;')}"
            data-code="${safeText(r.code).replace(/"/g,'&quot;')}"
            data-job="${safeText(r.job).replace(/"/g,'&quot;')}"
            data-level="${safeText(r.level).replace(/"/g,'&quot;')}"
            data-attack="${safeText(r.attack).replace(/"/g,'&quot;')}"
            data-note="${safeText(r.note).replace(/"/g,'&quot;')}"
            data-camp="${safeText(r.camp||'').replace(/"/g,'&quot;')}">修改</button>
        </td>
      </tr>
    `).join('');
  });

  $('#crossTableBody').html(html);
}

$('#crossSearchBtn').on('click', ()=>renderCrossTable(crossData));
$('#crossSearchInput').on('keypress', (e)=>{ if (e.which === 13) renderCrossTable(crossData); });
$('#btnReloadCross').on('click', loadCross);

/* =========================
   ✅ 成員：新增/修改（依 guild 寫回不同 GAS）
   - ASTAR：upsertByCode（含 camp + note）
   - MTEZ ：upsertMtezByCode（B/C/D/E/G/K）
   - ✅ 移除「聯絡方式」欄位（你要求）
========================= */
function openCrossEditor(values){
  const isNew = !!values.__isNew;

  const overlay = createEditor(isNew ? '新增成員' : '修改成員', `
    <label style="display:flex;flex-direction:column;gap:6px;">
      <span>公會</span>
      <select id="c_guildSel" class="form-select">
        <option value="ASTAR">ASTAR</option>
        <option value="MTEZ">MTEZ</option>
      </select>
    </label>

    <label style="display:flex;flex-direction:column;gap:6px;">
      <span>角色代碼（主鍵）</span>
      <input id="c_code" type="text" class="form-control" placeholder="例如：MTEZ001">
    </label>

    <label style="display:flex;flex-direction:column;gap:6px;">
      <span>角色名稱</span>
      <input id="c_name" type="text" class="form-control">
    </label>

    <label style="display:flex;flex-direction:column;gap:6px;">
      <span>角色職業</span>
      <input id="c_job" type="text" class="form-control">
    </label>

    <label style="display:flex;flex-direction:column;gap:6px;">
      <span>角色等級</span>
      <input id="c_level" type="text" class="form-control">
    </label>

    <label style="display:flex;flex-direction:column;gap:6px;">
      <span>角色乾表</span>
      <input id="c_attack" type="text" class="form-control">
    </label>

    <!-- ASTAR 才需要 camp -->
    <label id="campWrap" style="display:flex;flex-direction:column;gap:6px;">
      <span>所在營區（ASTAR 專用）</span>
      <input id="c_camp" type="text" class="form-control" placeholder="例如：普拉一營、炎魔二營...">
    </label>

    <label style="grid-column:1 / -1; display:flex;flex-direction:column;gap:6px;">
      <span>備註</span>
      <textarea id="c_note" class="form-control" rows="3"></textarea>
    </label>
  `);

  const initGuild = (values.guild && ['ASTAR','MTEZ'].includes(values.guild)) ? values.guild : (isNew ? 'MTEZ' : 'ASTAR');
  overlay.querySelector('#c_guildSel').value = initGuild;

  overlay.querySelector('#c_code').value   = values.code   || '';
  overlay.querySelector('#c_name').value   = values.name   || '';
  overlay.querySelector('#c_job').value    = values.job    || '';
  overlay.querySelector('#c_level').value  = values.level  || '';
  overlay.querySelector('#c_attack').value = values.attack || '';
  overlay.querySelector('#c_note').value   = values.note   || '';
  overlay.querySelector('#c_camp').value   = values.camp   || '';

  const campWrap = overlay.querySelector('#campWrap');
  function syncGuildUI(){
    const g = overlay.querySelector('#c_guildSel').value;
    campWrap.style.display = (g === 'ASTAR') ? 'flex' : 'none';
  }
  overlay.querySelector('#c_guildSel').addEventListener('change', syncGuildUI);
  syncGuildUI();

  const close = ()=>overlay.remove();
  overlay.querySelector('#btn_cancel').onclick = ()=>close();

  overlay.querySelector('#btn_save').onclick = async ()=>{
    const guildSel = overlay.querySelector('#c_guildSel').value;

    const payload = {
      guild:  guildSel,
      code:   overlay.querySelector('#c_code').value.trim(),
      name:   overlay.querySelector('#c_name').value.trim(),
      job:    overlay.querySelector('#c_job').value.trim(),
      level:  overlay.querySelector('#c_level').value.trim(),
      attack: overlay.querySelector('#c_attack').value.trim(),
      camp:   overlay.querySelector('#c_camp').value.trim(),
      note:   overlay.querySelector('#c_note').value.trim(),
    };

    if (!payload.code){
      alert('角色代碼不可為空（用來定位/更新）');
      return;
    }

    try{
      setBusy(overlay, true);

      if (guildSel === 'ASTAR'){
        const src = CROSS_SOURCES.find(s=>s.label==='ASTAR');
        const form = new URLSearchParams();
        form.set('action', src.action || 'upsertByCode');
        form.set('code', payload.code);
        form.set('name', payload.name);
        form.set('job', payload.job);
        form.set('level', payload.level);
        form.set('attack', payload.attack);
        form.set('camp', payload.camp);
        form.set('note', payload.note);

        const resp = await fetch(src.gasUrl, {
          method:'POST',
          headers:{ 'Content-Type':'application/x-www-form-urlencoded;charset=UTF-8' },
          body: form.toString(),
          cache:'no-store'
        });
        const text = await resp.text();
        let json; try{ json = JSON.parse(text); }catch{ throw new Error('ASTAR GAS 回傳非 JSON'); }
        if (!resp.ok || json.status !== 'ok') throw new Error(json.message || 'ASTAR 寫入失敗');
      } else {
        const src = CROSS_SOURCES.find(s=>s.label==='MTEZ');
        const form = new URLSearchParams();
        form.set('action', src.action || 'upsertMtezByCode');
        form.set('code', payload.code);     // C 欄
        form.set('name', payload.name);     // B 欄
        form.set('job', payload.job);       // D 欄
        form.set('level', payload.level);   // E 欄
        form.set('attack', payload.attack); // G 欄
        form.set('note', payload.note);     // K 欄
        form.set('updatedAt', nowISO());    // 可選：記錄更新時間

        const resp = await fetch(src.gasUrl, {
          method:'POST',
          headers:{ 'Content-Type':'application/x-www-form-urlencoded;charset=UTF-8' },
          body: form.toString(),
          cache:'no-store'
        });
        const text = await resp.text();
        let json; try{ json = JSON.parse(text); }catch{ throw new Error('MTEZ GAS 回傳非 JSON'); }
        if (!resp.ok || json.status !== 'ok') throw new Error(json.message || 'MTEZ 寫入失敗');
      }

      alert(isNew ? '新增成功！' : '更新成功！');
      close();
      loadCross();
    }catch(e){
      console.error(e);
      alert('送出失敗：' + e.message);
      setBusy(overlay, false);
    }
  };
}

// 新增：預設 MTEZ（可自行改）
$(document).on('click', '#btnAddCross', ()=>openCrossEditor({__isNew:true, guild:'MTEZ'}));
$(document).on('click', '.btn-edit-cross', function(){
  openCrossEditor({
    __isNew:false,
    guild: $(this).data('guild') || '',
    code: $(this).data('code') || '',
    name: $(this).data('name') || '',
    job: $(this).data('job') || '',
    level: $(this).data('level') || '',
    attack: $(this).data('attack') || '',
    note: $(this).data('note') || '',
    camp: $(this).data('camp') || ''
  });
});

/* 初始化：只載入成員（你招募牆如需也可自行加回） */
$(function(){
  loadCross();
});
</script>
</body>
</html>

<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RJPQ Tool</title>
  <script src="./config.js"></script>
  <style>
    :root{
      --bg:#0f1220; --panel:#171b2e; --panel2:#202743; --text:#edf2ff; --muted:#9ca8c7;
      --line:#2f385f; --accent:#87a7ff; --danger:#ff7d7d;
      --red:#ff6b6b; --blue:#4da3ff; --green:#59d98e; --yellow:#f5cc52;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,"Segoe UI",sans-serif;overflow-x:hidden}
    body{min-height:100vh}
    .app{max-width:1120px;margin:0 auto;padding:12px;overflow-x:hidden}
    .panel{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:12px;box-shadow:0 12px 30px rgba(0,0,0,.2)}
    .stack{display:grid;gap:12px}
    h1{font-size:24px;margin:0 0 4px}
    .sub{color:var(--muted);font-size:14px}
    .topbar{display:grid;gap:12px}
    .controls{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:8px}
    .controls .wide{grid-column:span 2}
    input,button{width:100%;min-height:44px;border-radius:12px;border:1px solid var(--line);background:var(--panel2);color:var(--text);padding:10px 12px;font-size:14px}
    button{cursor:pointer;font-weight:700}
    button:hover{filter:brightness(1.05)}
    .ghost{background:transparent}
    .statusline{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .badge{padding:6px 10px;border-radius:999px;background:var(--panel2);border:1px solid var(--line);font-size:13px}
    .ok{color:#85ffac}
    .bad{color:#ff9c9c}
    .players{display:flex;flex-wrap:wrap;gap:8px}
    .player{display:flex;align-items:center;gap:8px;background:var(--panel2);border:1px solid var(--line);padding:8px 10px;border-radius:999px}
    .dot{width:12px;height:12px;border-radius:999px;border:1px solid rgba(255,255,255,.35)}
    .dot.red{background:var(--red)} .dot.blue{background:var(--blue)} .dot.green{background:var(--green)} .dot.yellow{background:var(--yellow)}
    .colors{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}
    .color-btn.active{outline:2px solid #fff}
    .color-btn[disabled]{opacity:.35;cursor:not-allowed}
    .board{display:grid;gap:10px;overflow-x:hidden}
    .floor{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:10px}
    .floorhead{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:8px}
    .floor-title{font-weight:800}
    .platforms{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}
    .cell{position:relative;min-width:0;min-height:132px;border-radius:16px;border:1px solid var(--line);background:var(--panel2);padding:8px;display:grid;grid-template-rows:auto 1fr auto;gap:8px;user-select:none;-webkit-user-select:none;touch-action:manipulation}
    .cell:hover{border-color:#55649d}
    .cell-top{display:flex;justify-content:space-between;gap:8px;align-items:center}
    .cell-num{font-weight:800}
    .hint{color:var(--muted);font-size:12px}
    .chips{display:flex;flex-wrap:wrap;gap:6px;align-content:flex-start}
    .chip{display:inline-flex;align-items:center;gap:6px;max-width:100%;padding:5px 8px;border-radius:999px;border:1px solid rgba(255,255,255,.15);font-size:12px;line-height:1}
    .chip.success{background:rgba(135,167,255,.14)}
    .chip.fail{background:rgba(255,125,125,.12)}
    .chip b{font-weight:800}
    .chip .mark{font-size:11px;opacity:.85}
    .legend{display:flex;flex-wrap:wrap;gap:8px;color:var(--muted);font-size:12px}
    .footer-note{font-size:12px;color:var(--muted)}
    .hidden{display:none!important}
    @media (max-width:900px){
      .controls{grid-template-columns:repeat(2,minmax(0,1fr))}
      .controls .wide{grid-column:span 2}
    }
    @media (max-width:640px){
      .app{padding:10px}
      .controls,.colors{grid-template-columns:repeat(2,minmax(0,1fr))}
      .platforms{grid-template-columns:repeat(4,minmax(0,1fr))}
      .cell{min-height:122px;padding:7px}
      .chip{font-size:11px;padding:5px 7px}
      input,button{font-size:16px}
    }
  </style>
</head>
<body>
<div class="app stack">
  <section class="panel stack">
    <div>
      <h1>RJPQ 平台協作工具</h1>
      <div class="sub">手機與桌機都不出現橫向拖拉軸。左鍵切換成功標記，右鍵或長按切換 XX 標記，現在兩者都會同步給全房間。</div>
    </div>

    <div class="controls">
      <input id="backendUrl" class="wide" placeholder="後端網址">
      <input id="roomCode" placeholder="房號">
      <input id="roomPassword" placeholder="房間密碼">
      <input id="displayName" placeholder="你的名字">
      <button id="joinBtn">加入 / 建立房間</button>
      <button id="copyBtn" class="ghost">複製房間資訊</button>
    </div>

    <div class="colors">
      <button class="color-btn" data-color="red">紅色</button>
      <button class="color-btn" data-color="blue">藍色</button>
      <button class="color-btn" data-color="green">綠色</button>
      <button class="color-btn" data-color="yellow">黃色</button>
    </div>

    <div class="statusline">
      <span class="badge" id="connBadge">連線狀態：未連線</span>
      <span class="badge" id="roomBadge">房間：未加入</span>
      <button id="clearBtn">清空共享 / XX 標記</button>
    </div>

    <div class="players" id="players"></div>
    <div class="legend">
      <span>成功：藍色風格籤</span>
      <span>XX：紅色風格籤</span>
      <span>每個標記都會顯示顏色與名字，其他隊友能看出是誰做的。</span>
    </div>
  </section>

  <section class="board" id="board"></section>
  <div class="footer-note">提示：在手機上長按平台可切換 XX；桌機可右鍵切換 XX。</div>
</div>

<script>
const state = {
  ws: null,
  connected: false,
  room: null,
  yourClientId: null,
  selectedColor: "",
  longPressTimer: null
};

const backendInput = document.getElementById("backendUrl");
const roomCodeInput = document.getElementById("roomCode");
const roomPasswordInput = document.getElementById("roomPassword");
const displayNameInput = document.getElementById("displayName");
const connBadge = document.getElementById("connBadge");
const roomBadge = document.getElementById("roomBadge");
const playersEl = document.getElementById("players");
const boardEl = document.getElementById("board");
const colorButtons = [...document.querySelectorAll(".color-btn")];

backendInput.value = (window.RJPQ_CONFIG && window.RJPQ_CONFIG.backendUrl) || localStorage.getItem("rjpq_backend_url") || "http://localhost:8080";
roomCodeInput.value = location.hash.replace(/^#\/?/, "") || localStorage.getItem("rjpq_room_code") || "";
roomPasswordInput.value = localStorage.getItem("rjpq_room_password") || "";
displayNameInput.value = localStorage.getItem("rjpq_display_name") || "";

function saveLocal() {
  localStorage.setItem("rjpq_backend_url", backendInput.value.trim());
  localStorage.setItem("rjpq_room_code", roomCodeInput.value.trim());
  localStorage.setItem("rjpq_room_password", roomPasswordInput.value);
  localStorage.setItem("rjpq_display_name", displayNameInput.value.trim());
}

function setConn(text, ok=false){
  connBadge.textContent = "連線狀態：" + text;
  connBadge.classList.toggle("ok", ok);
  connBadge.classList.toggle("bad", !ok);
}

function wsUrlFromBackend(url){
  const clean = url.replace(/\/+$/, "");
  return clean.replace(/^http:\/\//i, "ws://").replace(/^https:\/\//i, "wss://");
}

function connectAndJoin(){
  saveLocal();
  const backendUrl = backendInput.value.trim();
  const roomCode = roomCodeInput.value.trim();
  const password = roomPasswordInput.value;
  if (!backendUrl || !roomCode) return alert("請先輸入後端網址與房號");
  location.hash = "/" + roomCode;
  roomBadge.textContent = "房間：" + roomCode;
  setConn("連線中...");
  if (state.ws) state.ws.close();
  const ws = new WebSocket(wsUrlFromBackend(backendUrl));
  state.ws = ws;

  ws.onopen = () => {
    setConn("已連線", true);
    ws.send(JSON.stringify({ type:"join_room", code: roomCode, password }));
  };
  ws.onclose = () => {
    setConn("已斷線", false);
    state.connected = false;
  };
  ws.onerror = () => {
    setConn("連線失敗", false);
  };
  ws.onmessage = (event) => {
    const msg = JSON.parse(event.data);
    if (msg.type === "hello") {
      state.yourClientId = msg.clientId;
      return;
    }
    if (msg.type === "error") {
      alert(msg.message);
      return;
    }
    if (msg.type === "room_state") {
      state.room = msg.room;
      if (msg.yourClientId) state.yourClientId = msg.yourClientId;
      const me = state.room.players[state.yourClientId] || {};
      state.selectedColor = me.color || state.selectedColor;
      renderPlayers();
      renderColorButtons();
      renderBoard();
      const code = roomCodeInput.value.trim();
      roomBadge.textContent = "房間：" + code;
      const currentName = (state.room.players[state.yourClientId] || {}).name || "";
      if (currentName && displayNameInput.value.trim() !== currentName) {
        displayNameInput.value = currentName;
      }
    }
  };
}

function send(data){
  if (!state.ws || state.ws.readyState !== 1) return;
  state.ws.send(JSON.stringify(data));
}

function currentProfile(){
  return (state.room && state.room.players && state.room.players[state.yourClientId]) || {};
}

function setProfile(color = state.selectedColor){
  const name = displayNameInput.value.trim();
  state.selectedColor = color || "";
  send({ type:"set_profile", color: state.selectedColor, name });
}

function renderPlayers(){
  playersEl.innerHTML = "";
  const players = Object.entries((state.room && state.room.players) || {});
  if (!players.length) {
    playersEl.innerHTML = '<div class="sub">尚無隊友資料</div>';
    return;
  }
  for (const [clientId, p] of players) {
    const el = document.createElement("div");
    el.className = "player";
    const me = clientId === state.yourClientId ? "（你）" : "";
    el.innerHTML = `<span class="dot ${p.color || ""}"></span><span>${escapeHtml(p.name || "未命名")} ${me}</span>`;
    playersEl.appendChild(el);
  }
}

function renderColorButtons(){
  const used = new Map();
  const players = Object.entries((state.room && state.room.players) || {});
  for (const [clientId, p] of players) {
    if (p.color) used.set(p.color, clientId);
  }
  colorButtons.forEach(btn => {
    const color = btn.dataset.color;
    const owner = used.get(color);
    const isMine = owner === state.yourClientId;
    btn.disabled = !!owner && !isMine;
    btn.classList.toggle("active", state.selectedColor === color);
  });
}

function nameByColor(color){
  const players = Object.values((state.room && state.room.players) || {});
  const found = players.find(p => p.color === color);
  return found?.name || color;
}

function chipHTML(kind, color, name){
  const safe = escapeHtml(name || color || "未命名");
  const mark = kind === "success" ? "成功" : "XX";
  const cls = kind === "success" ? "success" : "fail";
  return `<span class="chip ${cls}"><span class="dot ${color}"></span><b>${safe}</b><span class="mark">${mark}</span></span>`;
}

function renderBoard(){
  boardEl.innerHTML = "";
  const floors = (state.room && state.room.floors) || {};
  for (let floor = 10; floor >= 1; floor--) {
    const f = floors[String(floor)] || { success:{}, fail:{} };
    const wrap = document.createElement("div");
    wrap.className = "floor";
    wrap.innerHTML = `<div class="floorhead"><div class="floor-title">第 ${floor} 層</div><div class="hint">左鍵：成功｜右鍵/長按：XX（共享）</div></div>`;
    const platforms = document.createElement("div");
    platforms.className = "platforms";

    for (let platform = 1; platform <= 4; platform++) {
      const cell = document.createElement("div");
      cell.className = "cell";
      cell.dataset.floor = String(floor);
      cell.dataset.platform = String(platform);

      const successChips = [];
      for (const [color, pos] of Object.entries(f.success || {})) {
        if (pos === platform) successChips.push(chipHTML("success", color, nameByColor(color)));
      }

      const failChips = [];
      for (const [color, list] of Object.entries(f.fail || {})) {
        if ((list || []).includes(platform)) failChips.push(chipHTML("fail", color, nameByColor(color)));
      }

      cell.innerHTML = `
        <div class="cell-top">
          <div class="cell-num">平台 ${platform}</div>
          <div class="hint">${successChips.length + failChips.length} 標記</div>
        </div>
        <div class="chips">${successChips.join("")}${failChips.join("")}</div>
        <div class="hint">成功與 XX 都會同步</div>
      `;

      cell.addEventListener("click", (e) => {
        if (e.defaultPrevented) return;
        const me = currentProfile();
        if (!me.color) return alert("請先選顏色");
        send({ type:"toggle_success", floor, platform });
      });

      cell.addEventListener("contextmenu", (e) => {
        e.preventDefault();
        const me = currentProfile();
        if (!me.color) return alert("請先選顏色");
        send({ type:"toggle_fail", floor, platform });
      });

      cell.addEventListener("touchstart", () => {
        state.longPressTimer = setTimeout(() => {
          const me = currentProfile();
          if (!me.color) return;
          send({ type:"toggle_fail", floor, platform });
        }, 550);
      }, { passive:true });

      ["touchend","touchcancel","touchmove"].forEach(evt => {
        cell.addEventListener(evt, () => clearTimeout(state.longPressTimer), { passive:true });
      });

      platforms.appendChild(cell);
    }
    wrap.appendChild(platforms);
    boardEl.appendChild(wrap);
  }
}

function escapeHtml(text){
  return String(text ?? "").replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
}

document.getElementById("joinBtn").addEventListener("click", connectAndJoin);
document.getElementById("copyBtn").addEventListener("click", async () => {
  const text = `Room: ${roomCodeInput.value.trim()}\nPassword: ${roomPasswordInput.value}\nLink: ${location.href}`;
  try { await navigator.clipboard.writeText(text); alert("已複製房間資訊"); }
  catch { alert(text); }
});
document.getElementById("clearBtn").addEventListener("click", () => {
  if (!confirm("確定清空全房共享成功 / XX 標記？")) return;
  send({ type:"clear_shared" });
});
displayNameInput.addEventListener("change", () => setProfile());
displayNameInput.addEventListener("blur", () => setProfile());
colorButtons.forEach(btn => {
  btn.style.background = `var(--${btn.dataset.color})`;
  btn.style.color = btn.dataset.color === "yellow" ? "#2b2200" : "#fff";
  btn.addEventListener("click", () => setProfile(btn.dataset.color));
});

if (roomCodeInput.value.trim()) connectAndJoin();
renderBoard();
</script>
</body>
</html>

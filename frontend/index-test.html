<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RJPQ Tool 多人連線版 Astar公會製作</title>
  <script src="./config.js"></script>
  <style>
    :root{
      --bg:#0b1220; --panel:#121a2b; --panel2:#182238; --text:#eef3ff; --muted:#9fb0d1;
      --border:#2a3857; --accent:#7aa2ff; --danger:#ff7b7b; --ok:#59d39c; --warn:#ffd166;
      --red:#ff6b6b; --blue:#5aa9ff; --green:#4fd18b; --yellow:#f3c84b;
      --red2:#FF969650; --blue2:#9696FF50; --green2:#96FF9650; --yellow2:#FFFF9650;
    }
    * { box-sizing: border-box; }
    html, body { overflow-x:hidden; }
    body{
      margin:0; font-family: Inter, "Noto Sans TC", system-ui, sans-serif;
      background:linear-gradient(180deg,#08101d,#0e1526 45%,#0a1120);
      color:var(--text);
    }
    .wrap{max-width:1200px; margin:0 auto; padding:24px;}
    .hero{display:flex; gap:16px; align-items:center; justify-content:space-between; flex-wrap:wrap; margin-bottom:18px;}
    h1{margin:0; font-size:clamp(28px,4vw,40px)}
    .sub{color:var(--muted); margin-top:8px}
    .card{
      background:rgba(18,26,43,.92); border:1px solid var(--border); border-radius:18px;
      box-shadow: 0 12px 30px rgba(0,0,0,.25);
      padding:18px;
    }
    .grid{display:grid; gap:16px}
    .top-grid{grid-template-columns: 1.1fr 1.4fr}
    @media (max-width: 980px){ .top-grid{grid-template-columns:1fr} }
    .row{display:flex; gap:3px 6px; flex-wrap:wrap; align-items:center}
    .field{display:flex; flex-direction:column; gap:6px; flex:1; min-width:180px}
    label{font-size:13px; color:var(--muted)}
    input{
      width:100%; background:#0b1324; color:var(--text); border:1px solid var(--border);
      border-radius:12px; padding:12px 14px; outline:none;
    }
    input:focus{border-color:var(--accent); box-shadow:0 0 0 3px rgba(122,162,255,.15)}
    button{
      border:0; border-radius:12px; padding:12px 16px; cursor:pointer; color:white;
      background:#2b61ff; font-weight:700;
    }
    button.secondary{background:#263149}
    button.ghost{background:transparent; border:1px solid var(--border)}
    button.warn{background:#8e5b00}
    button.danger{background:#8a2f36}
    button:disabled{opacity:.5; cursor:not-allowed}
    .hidden{display:none !important}
    .status{
      display:flex; flex-wrap:wrap; gap:6px; align-items:center; justify-content:space-between;
      margin:4px 0 4px;
    }
    .pill{
      padding:8px 12px; border-radius:999px; background:#0b1324; border:1px solid var(--border);
      color:var(--muted); font-size:14px;
    }
    .pill strong{color:var(--text)}
    .colors{display:flex; gap:6px; flex-wrap:wrap}
    .color-btn{
      width:40px; height:40px; border-radius:999px; border:3px solid transparent; position:relative;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.1);
    }
    .color-btn.selected{border-color:white}
    .color-btn.taken::after{
      content:""; position:absolute; inset:8px; border-radius:999px; border:3px solid rgba(255,255,255,.95);
      transform:rotate(45deg);
    }
    .legend{display:flex; gap:3px 6px; flex-wrap:wrap;}
    .legend-item{
      display:flex; align-items:center; gap:6px; color:var(--muted); font-size:14px;
      background:#0b1324; border:1px solid var(--border); padding:8px 10px; border-radius:999px;
    }
    .dot{width:14px; height:14px; border-radius:999px}
    .board{overflow:visible;}
    table{width:100%; border-collapse:separate; border-spacing:6px 6px; min-width:240px; table-layout:fixed}
    th{font-size:13px; color:var(--muted); font-weight:700}
    td.floor-cell{
      width:30px; text-align:center; color:var(--muted); font-weight:700;
      background:#0b1324; border:1px solid var(--border); border-radius:10px; padding:1px 0px 4px 0px;
      justify-content: center; align-items: center; height: 40px;
    }
    td.pick{
      position:relative; min-width:0px; text-align:center; user-select:none;
      background:#101a2f; border:1px solid var(--border); border-radius:10px; padding:1px 0px 4px 0px; cursor:pointer;
      transition:.15s transform ease,.15s border-color ease,.15s background ease;
      justify-content: center; align-items: center; height: 40px;
    }
    td.pick:hover{transform:translateY(-1px); border-color:#4560a3; background:#12203c}
    td.pick .submark{
      display:inline-flex; align-items:center; gap:6px; padding:0px 4px; border-radius:999px;
      background:rgba(255,255,255,.00); margin-top:0px; font-size:12px; font-weight:700; color:var(--muted);
      justify-content:center; align-items:center; width: 100%;
    }
    td.pick.private-wrong{
      background:
        linear-gradient(135deg, transparent 47%, rgba(255,123,123,.9) 47%, rgba(255,123,123,.9) 53%, transparent 53%),
        linear-gradient(45deg, transparent 47%, rgba(255,123,123,.9) 47%, rgba(255,123,123,.9) 53%, transparent 53%),
        #101a2f;
    }
    .marker{
      display:inline-flex; align-items:center; gap:6px; padding:0px 4px; border-radius:999px;
      background:rgba(255,255,255,.05); margin-top:0px; font-size:12px; font-weight:700; color:#FFFFFF64;
      justify-content:center; align-items:center; width: 45%;
    }
    .hint{color:var(--muted); font-size:13px; line-height:1.6}
    .footer{margin-top:16px; color:var(--muted); font-size:13px}
    code{background:#0b1324; padding:2px 6px; border-radius:6px}
    .toast{
      position:fixed; right:20px; bottom:20px; background:#0b1324; border:1px solid var(--border);
      border-radius:14px; padding:12px 14px; color:var(--text); box-shadow:0 12px 30px rgba(0,0,0,.35);
      opacity:0; transform:translateY(10px); pointer-events:none; transition:.2s ease;
    }
    .toast.show{opacity:1; transform:none}
    .inline-code{font-family:ui-monospace, SFMono-Regular, Menlo, Consolas, monospace}
    .pick.has-public-mark{box-shadow:inset 0 0 0 1px rgba(255,209,102,.55)}
    .public-xx-badge{
      position:absolute; top:4px; right:4px; min-width:26px; height:18px; padding:0 6px;
      border-radius:999px; background:rgba(255,209,102,.18); border:1px solid rgba(255,209,102,.5);
      color:#ffe7a6; font-size:10px; font-weight:800; display:inline-flex; align-items:center; justify-content:center;
      letter-spacing:.4px;
    }
    .floating-window{
      position:fixed; right:18px; bottom:18px; width:min(360px, calc(100vw - 24px)); max-height:min(70vh, 760px);
      z-index:50; display:flex; flex-direction:column; gap:10px; padding:12px; border-radius:18px;
      background:rgba(12,18,31,.96); border:1px solid rgba(122,162,255,.28); box-shadow:0 18px 45px rgba(0,0,0,.38);
      backdrop-filter:blur(14px);
    }
    .floating-window.minimized{height:auto; max-height:none}
    .floating-header{display:flex; align-items:center; justify-content:space-between; gap:12px; cursor:move}
    .floating-title{font-size:14px; font-weight:800}
    .floating-actions{display:flex; gap:6px}
    .floating-actions button{padding:8px 12px; border-radius:10px; font-size:12px}
    .floating-meta{display:flex; flex-wrap:wrap; gap:6px}
    .floating-pill{
      padding:6px 10px; border-radius:999px; background:#0b1324; border:1px solid var(--border);
      color:var(--muted); font-size:12px;
    }
    .floating-board{overflow:auto; padding-right:2px}
    .floating-board table{border-spacing:4px 4px; min-width:0}
    .floating-board td.floor-cell,.floating-board td.pick{height:32px; padding:0}
    .floating-board .submark,.floating-board .marker{font-size:10px; width:100%}

    @media (max-width: 360px){
      .wrap{padding:12px}
      .card{padding:14px}
      .hero{margin-bottom:12px}
      h1{font-size:24px}
      .sub{font-size:13px}
      .status{gap:12px}
      .status .row{width:100%}
      .status .row:last-child button{flex:1}
      .grid[style*="grid-template-columns:1fr 1fr"]{grid-template-columns:1fr !important}
      .board{overflow:visible}
      table{min-width:0; width:100%; border-spacing:0;}
      thead{display:none}
      tbody{display:flex; flex-direction:column; gap:12px;}
      tbody tr{
        display:grid;
        grid-template-columns:repeat(4, minmax(0, 1fr));
        gap:8px;
        background:#0b1324;
        border:1px solid var(--border);
        border-radius:14px;
        padding:10px;
      }
      td.floor-cell{
        grid-column:1 / -1;
        width:auto;
        padding:10px 12px;
        border-radius:10px;
        font-size:14px;
      }
      td.pick{
        min-width:0;
        width:100%;
        padding:14px 6px;
        border-radius:12px;
      }
      td.pick .submark{font-size:11px; margin-top:6px}
      .marker{
        width:100%;
        justify-content:center;
        gap:6px;
        padding:6px 8px;
        font-size:11px;
        margin-top:6px;
      }
      .footer{font-size:12px; line-height:1.6}
      .floating-window{
        right:12px; bottom:12px; width:calc(100vw - 24px); max-height:60vh;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <div>
        <h1>RJPQ Tool 多人連線版 Astar 公會製作</h1>
        <div class="sub">羅密歐與茱麗葉組隊任務平台協作工具</div>
      </div>
      <div class="pill" id="connPill">連線狀態：<strong id="connState">未連線</strong></div>
    </div>

    <div id="lobbyView" class="grid top-grid">
      <div class="card">
        <h2 style="margin-top:0">建立房間</h2>
        <div class="grid">
          <div class="field">
            <label>房號</label>
            <input id="createRoomCode" placeholder="例如：rj-001" />
          </div>
          <div class="field">
            <label>房間密碼（可留空）</label>
            <input id="createRoomPassword" placeholder="選填" />
          </div>
          <div class="row">
            <button id="createRoomBtn">建立並進入</button>
            <button id="randomRoomBtn" class="secondary">隨機房號</button>
          </div>
        </div>
      </div>

      <div class="card">
        <h2 style="margin-top:0">加入房間</h2>
        <div class="grid">
          <div class="field">
            <label>房號</label>
            <input id="joinRoomCode" placeholder="輸入房號或直接開啟 #/房號" />
          </div>
          <div class="field">
            <label>房間密碼（若有）</label>
            <input id="joinRoomPassword" placeholder="選填" />
          </div>
          <div class="row">
            <button id="joinRoomBtn">加入房間</button>
          </div>
          <div class="hint">
            你也可以直接分享網址 <code class="inline-code">#/房號</code> 給隊友。<br>
            前端預設會嘗試連到目前網域的 WebSocket 後端；也可點右上角設定自訂伺服器位址。
          </div>
        </div>
      </div>
    </div>

    <div id="roomView" class="hidden">
      <div class="card">
        <div class="status">
          <div class="row">
            <div class="pill">房號：<strong id="roomCodeText"></strong></div>
            <div class="pill">你的連線 ID：<strong id="clientIdText"></strong></div>
            <div class="pill">在線人數：<strong id="memberCountText">0</strong></div>
          </div>
          <div class="row">
            <button id="copyRoomBtn" class="secondary" style="width:115px; height:40px; display:inline-flex; justify-content:center; align-items:center;">複製房間資訊</button>
            <button id="clearSharedBtn" class="warn" style="width:115px; height:40px; display:inline-flex; justify-content:center; align-items:center;">清空共享標記</button>
            <button id="leaveRoomBtn" class="danger" style="width:115px; height:40px; display:inline-flex; justify-content:center; align-items:center;">離開房間</button>
          </div>
        </div>

        <div class="grid" style="grid-template-columns:1fr 1fr; margin-top:14px">
          <div>
            <h3 style="margin:0 0 8px 0">選擇顏色</h3>
            <div class="colors" id="colorPicker"></div>
          </div>
          <div>
            <h3 style="margin:0 0 4px 0">操作說明</h3>
            <div class="hint">
              左鍵：設定/取消你的共享正解。<br>
              右鍵：設定/取消你自己的私人錯誤標記。<br>
              每層共享標記只允許每個顏色一個位置；顏色不可重複選取。
            </div>
          </div>
        </div>
        <div class="legend" id="memberLegend"></div>

        <div class="board" style="width: 100%; max-width: 450px; display: flex; flex-direction: column; align-items: center; margin-left: auto; margin-right: auto;">
          <table>
            <thead>
              <tr>
                <th style="width:50px">樓層</th>
                <th>　</th>
                <th>　</th>
                <th>　</th>
                <th>　</th>
              </tr>
            </thead>
            <tbody id="boardBody"></tbody>
          </table>

          <button id="clearSharedBtn2" class="warn" style="width:100%; height:40px; display:inline-flex; justify-content:center; align-items:center;">清空共享標記</button>
        </div>

        <div class="footer">
          有任何使用問題請聯繫 Neight奈特
        </div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    const COLORS = {
      red:    { label: '紅', hex: getComputedStyle(document.documentElement).getPropertyValue('--red').trim() || '#ff6b6b' },
      blue:   { label: '藍', hex: getComputedStyle(document.documentElement).getPropertyValue('--blue').trim() || '#5aa9ff' },
      green:  { label: '綠', hex: getComputedStyle(document.documentElement).getPropertyValue('--green').trim() || '#4fd18b' },
      yellow: { label: '黃', hex: getComputedStyle(document.documentElement).getPropertyValue('--yellow').trim() || '#f3c84b' },
    };
    const COLORS2 = {
      red:    { label: '紅', hex: getComputedStyle(document.documentElement).getPropertyValue('--red2').trim() || '#FF969650' },
      blue:   { label: '藍', hex: getComputedStyle(document.documentElement).getPropertyValue('--blue2').trim() || '#9696FF50' },
      green:  { label: '綠', hex: getComputedStyle(document.documentElement).getPropertyValue('--green2').trim() || '#96FF9650' },
      yellow: { label: '黃', hex: getComputedStyle(document.documentElement).getPropertyValue('--yellow2').trim() || '#FFFF9650' },
    };

    const state = {
      ws: null,
      connected: false,
      clientId: '',
      roomCode: '',
      roomPassword: '',
      me: { color: null },
      room: null,
      profileName: loadProfileName(),
      localWrong: loadLocalWrong(),
      wsUrl: loadWsUrl(),
      pendingJoin: null,
      autoJoinAttempted: false,
      floatingOpen: false,
      floatingMinimized: false,
    };

    const $ = (sel) => document.querySelector(sel);
    const boardBody = $('#boardBody');

    function showToast(text){
      const toast = $('#toast');
      toast.textContent = text;
      toast.classList.add('show');
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toast.classList.remove('show'), 2200);
    }

    function normalizeRoomCode(s){
      return (s || '').trim().toLowerCase().replace(/\s+/g, '-');
    }

    function randomRoomCode(){
      return 'rj-' + Math.random().toString(36).slice(2, 8);
    }

    function normalizeBackendUrl(url){
      if(!url) return '';
      url = String(url).trim().replace(/\/$/, '');
      if(!/^https?:\/\//i.test(url)) url = 'https://' + url;
      return url;
    }

    function wsDefaultUrl(){
      const configured = normalizeBackendUrl(window.APP_CONFIG?.backendUrl || '');
      const fromQuery = normalizeBackendUrl(new URLSearchParams(location.search).get('backend') || '');
      if(fromQuery) return fromQuery.replace(/^http/i, m => m.toLowerCase() === 'https' ? 'wss' : 'ws') + '/ws';
      const saved = normalizeBackendUrl(localStorage.getItem('rjpq_backend_url') || '');
      const target = saved || configured;
      if(target) return target.replace(/^http/i, m => m.toLowerCase() === 'https' ? 'wss' : 'ws') + '/ws';
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      return `${proto}//${location.host}/ws`;
    }

    function loadWsUrl(){ return wsDefaultUrl(); }

    function saveWsUrl(url){
      const normalized = normalizeBackendUrl(url);
      if(normalized) localStorage.setItem('rjpq_backend_url', normalized);
      else localStorage.removeItem('rjpq_backend_url');
      state.wsUrl = loadWsUrl();
      renderBackendSettings();
    }

    function currentBackendHttpUrl(){
      const saved = normalizeBackendUrl(localStorage.getItem('rjpq_backend_url') || '');
      const configured = normalizeBackendUrl(window.APP_CONFIG?.backendUrl || '');
      const fromQuery = normalizeBackendUrl(new URLSearchParams(location.search).get('backend') || '');
      return fromQuery || saved || configured || '';
    }

    function renderBackendSettings(){
      const input = $('#backendUrl');
      const hint = $('#backendHint');
      if(input) input.value = currentBackendHttpUrl();
      if(hint){
        const active = currentBackendHttpUrl();
        hint.textContent = active
          ? `目前會連到：${active}（WebSocket: ${state.wsUrl}）`
          : `目前未指定後端，將嘗試連到同網域：${state.wsUrl}`;
      }
    }

    function loadLocalWrong(){
      try { return JSON.parse(localStorage.getItem('rjpq_local_wrong') || '{}'); } catch { return {}; }
    }

    function loadProfileName(){
      return (localStorage.getItem('rjpq_profile_name') || '').trim();
    }

    function saveProfileName(name){
      const next = String(name || '').trim().slice(0, 20);
      state.profileName = next;
      if(next) localStorage.setItem('rjpq_profile_name', next);
      else localStorage.removeItem('rjpq_profile_name');
    }

    function fallbackName(clientId){
      return `Player-${String(clientId || '').slice(0, 4)}`;
    }

    function getDisplayName(member){
      if(!member) return fallbackName('');
      return (member.name || '').trim() || fallbackName(member.clientId);
    }

    function getMemberById(clientId){
      return state.room?.members?.find(member => member.clientId === clientId) || null;
    }

    function getPublicMarkMembers(floor, door){
      const key = `${floor}-${door}`;
      const ids = state.room?.publicMarks?.[key] || [];
      return ids.map(id => getMemberById(id)).filter(Boolean);
    }

    function currentProfileName(){
      return (state.profileName || '').trim();
    }

    function persistLocalWrong(){
      localStorage.setItem('rjpq_local_wrong', JSON.stringify(state.localWrong));
    }

    function roomWrongKey(){ return state.roomCode || '_lobby'; }

    function getWrongSet(){
      if(!state.localWrong[roomWrongKey()]) state.localWrong[roomWrongKey()] = {};
      return state.localWrong[roomWrongKey()];
    }

    function updateHash(){
      if(state.roomCode) {
        const url = new URL(location.href);
        url.hash = '#/' + encodeURIComponent(state.roomCode);
        history.replaceState(null, '', url.toString());
      } else {
        history.replaceState(null, '', location.pathname + location.search);
      }
    }

    function buildShareLink(){
      const url = new URL(location.href);
      url.hash = '#/' + encodeURIComponent(state.roomCode);
      if(state.roomPassword) url.searchParams.set('pwd', state.roomPassword);
      else url.searchParams.delete('pwd');
      url.searchParams.set('autojoin', '1');
      return url.toString();
    }

    function ensureUtilityButtons(){
      const actionRow = document.querySelector('#roomView .status .row:last-child');
      if(!actionRow || $('#renameBtn')) return;

      const renameBtn = document.createElement('button');
      renameBtn.id = 'renameBtn';
      renameBtn.className = 'ghost';
      renameBtn.style.width = '115px';
      renameBtn.style.height = '40px';
      renameBtn.style.display = 'inline-flex';
      renameBtn.style.justifyContent = 'center';
      renameBtn.style.alignItems = 'center';
      renameBtn.textContent = 'Rename';

      const floatingBtn = document.createElement('button');
      floatingBtn.id = 'floatingBtn';
      floatingBtn.className = 'ghost';
      floatingBtn.style.width = '115px';
      floatingBtn.style.height = '40px';
      floatingBtn.style.display = 'inline-flex';
      floatingBtn.style.justifyContent = 'center';
      floatingBtn.style.alignItems = 'center';
      floatingBtn.textContent = 'Float';

      actionRow.append(renameBtn, floatingBtn);
    }

    function ensureFloatingWindow(){
      if($('#floatingWindow')) return;
      document.body.insertAdjacentHTML('beforeend', `
        <div id="floatingWindow" class="floating-window hidden">
          <div id="floatingWindowHeader" class="floating-header">
            <div class="floating-title">RJPQ Float Window</div>
            <div class="floating-actions">
              <button id="floatingMinBtn" class="secondary" type="button">Min</button>
              <button id="floatingCloseBtn" class="ghost" type="button">Close</button>
            </div>
          </div>
          <div id="floatingMeta" class="floating-meta"></div>
          <div id="floatingBoard" class="floating-board"></div>
          <div id="floatingHint" class="hint">Desktop: left click shared, right click public XX. Mobile: long press public XX.</div>
        </div>
      `);

      const floating = $('#floatingWindow');
      const header = $('#floatingWindowHeader');
      let dragging = false;
      let offsetX = 0;
      let offsetY = 0;

      header.addEventListener('mousedown', (event) => {
        dragging = true;
        const rect = floating.getBoundingClientRect();
        offsetX = event.clientX - rect.left;
        offsetY = event.clientY - rect.top;
        floating.style.left = `${rect.left}px`;
        floating.style.top = `${rect.top}px`;
        floating.style.right = 'auto';
        floating.style.bottom = 'auto';
      });

      document.addEventListener('mousemove', (event) => {
        if(!dragging) return;
        floating.style.left = `${Math.max(8, event.clientX - offsetX)}px`;
        floating.style.top = `${Math.max(8, event.clientY - offsetY)}px`;
      });

      document.addEventListener('mouseup', () => {
        dragging = false;
      });

      $('#floatingCloseBtn').onclick = () => toggleFloatingWindow(false);
      $('#floatingMinBtn').onclick = () => {
        state.floatingMinimized = !state.floatingMinimized;
        renderFloatingWindow();
      };
    }

    function toggleFloatingWindow(force){
      ensureFloatingWindow();
      state.floatingOpen = typeof force === 'boolean' ? force : !state.floatingOpen;
      renderFloatingWindow();
    }

    function renderFloatingWindow(){
      ensureFloatingWindow();
      const floating = $('#floatingWindow');
      const board = $('#floatingBoard');
      const meta = $('#floatingMeta');
      const minBtn = $('#floatingMinBtn');
      const hint = $('#floatingHint');
      const toggleBtn = $('#floatingBtn');
      const canShow = state.floatingOpen && !!state.room;

      floating.classList.toggle('hidden', !canShow);
      floating.classList.toggle('minimized', !!state.floatingMinimized);
      if(toggleBtn) toggleBtn.textContent = canShow ? 'Hide Float' : 'Float';
      if(!canShow) return;

      const me = getMemberById(state.clientId);
      meta.innerHTML = '';
      [
        `Room ${state.room.code}`,
        `Players ${state.room.memberCount || 0}`,
        `Name ${getDisplayName(me)}`,
      ].forEach(text => {
        const item = document.createElement('div');
        item.className = 'floating-pill';
        item.textContent = text;
        meta.appendChild(item);
      });

      minBtn.textContent = state.floatingMinimized ? 'Open' : 'Min';
      board.classList.toggle('hidden', !!state.floatingMinimized);
      hint.classList.toggle('hidden', !!state.floatingMinimized);
      if(state.floatingMinimized) return;

      const shared = state.room?.board || [];
      board.innerHTML = '<table><tbody></tbody></table>';
      const tbody = board.querySelector('tbody');
      for(let floor = 10; floor >= 1; floor--){
        const tr = document.createElement('tr');
        const floorTd = document.createElement('td');
        floorTd.className = 'floor-cell';
        floorTd.textContent = `${floor}`;
        tr.appendChild(floorTd);

        for(let door = 1; door <= 4; door++){
          const td = document.createElement('td');
          td.className = 'pick';
          const floorData = shared[floor - 1] || {};
          const markMembers = getPublicMarkMembers(floor, door);
          let occupantColor = null;

          Object.entries(floorData).forEach(([color, pickDoor]) => {
            if(pickDoor === door) occupantColor = color;
          });

          if(occupantColor){
            td.style.background = COLORS2[occupantColor].hex;
          } else {
            const wrongMap = getWrongSet();
            if(wrongMap[`${floor}-${door}`]) td.classList.add('private-wrong');
          }

          const sub = document.createElement('div');
          sub.className = 'submark';
          sub.textContent = markMembers.length ? `XX ${markMembers.length}` : '　　　';
          td.appendChild(sub);

          if(markMembers.length){
            td.classList.add('has-public-mark');
            td.title = `Public XX: ${markMembers.map(member => getDisplayName(member)).join(', ')}`;
          }

          bindCellInteractions(td, floor, door);
          tr.appendChild(td);
        }
        tbody.appendChild(tr);
      }
    }

    function promptRename(){
      const current = state.profileName || getDisplayName(getMemberById(state.clientId));
      const next = prompt('Input display name (max 20 chars)', current);
      if(next == null) return;

      const normalized = String(next).trim().slice(0, 20);
      if(!normalized){
        showToast('Name is required');
        return;
      }

      saveProfileName(normalized);
      const me = getMemberById(state.clientId);
      if(me) me.name = normalized;
      if(state.roomCode) send('update_name', { roomCode: state.roomCode, name: normalized });
      renderRoom();
      showToast('Name updated');
    }

    function setConnectionState(text, ok=false){
      $('#connState').textContent = text;
      $('#connPill').style.borderColor = ok ? 'rgba(89,211,156,.4)' : '';
      $('#connPill').style.color = ok ? '#c9ffe7' : '';
    }

    function connectWs(){
      if(state.ws && (state.ws.readyState === WebSocket.OPEN || state.ws.readyState === WebSocket.CONNECTING)) return;
      try {
        const ws = new WebSocket(state.wsUrl);
        state.ws = ws;
        setConnectionState('連線中...');
        ws.onopen = () => {
          state.connected = true;
          setConnectionState('已連線', true);
          if(state.pendingJoin){
            ws.send(JSON.stringify(state.pendingJoin));
          }
        };
        ws.onmessage = (event) => {
          const msg = JSON.parse(event.data);
          handleMessage(msg);
        };
        ws.onclose = () => {
          state.connected = false;
          setConnectionState('已斷線');
          if(state.roomCode){
            state.pendingJoin = {
              type: 'join_room',
              roomCode: state.roomCode,
              password: state.roomPassword || '',
              name: currentProfileName(),
            };
          }
          setTimeout(() => {
            if(state.roomCode) connectWs();
          }, 1200);
        };
        ws.onerror = () => {
          setConnectionState('連線失敗');
        };
      } catch (e){
        console.error(e);
        setConnectionState('連線失敗');
      }
    }

    function send(type, data={}){
      const payload = { type, ...data };
      if(state.ws && state.ws.readyState === WebSocket.OPEN){
        state.ws.send(JSON.stringify(payload));
      } else {
        state.pendingJoin = payload;
        connectWs();
      }
    }

    function joinOrCreate(mode){
      const roomCode = normalizeRoomCode(mode === 'create' ? $('#createRoomCode').value : $('#joinRoomCode').value);
      const password = (mode === 'create' ? $('#createRoomPassword').value : $('#joinRoomPassword').value) || '';
      const name = currentProfileName();
      if(!roomCode){
        showToast('請輸入房號');
        return;
      }
      state.roomCode = roomCode;
      state.roomPassword = password;
      updateHash();
      state.pendingJoin = { type: mode === 'create' ? 'create_room' : 'join_room', roomCode, password, name };
      connectWs();
      if(state.connected) send(state.pendingJoin.type, { roomCode, password, name });
    }

    function handleMessage(msg){
      switch(msg.type){
        case 'welcome':
          state.clientId = msg.clientId;
          $('#clientIdText').textContent = msg.clientId.slice(0, 8);
          break;
        case 'room_state':
          state.room = msg.room;
          state.me.color = msg.yourColor || state.me.color || null;
          renderRoom();
          break;
        case 'joined_room':
          state.roomCode = msg.roomCode;
          state.roomPassword = state.roomPassword || '';
          updateHash();
          showRoomView();
          showToast('已進入房間');
          break;
        case 'error':
          showToast(msg.message || '發生錯誤');
          break;
        case 'left_room':
          leaveRoomLocal(false);
          break;
      }
    }

    function showRoomView(){
      $('#lobbyView').classList.add('hidden');
      $('#roomView').classList.remove('hidden');
    }

    function showLobbyView(){
      $('#roomView').classList.add('hidden');
      $('#lobbyView').classList.remove('hidden');
    }

    function leaveRoomLocal(sendMsg=true){
      if(sendMsg && state.roomCode) send('leave_room', { roomCode: state.roomCode });
      state.roomCode = '';
      state.roomPassword = '';
      state.me.color = null;
      state.room = null;
      updateHash();
      showLobbyView();
      renderFloatingWindow();
    }

    function renderRoom(){
      if(!state.room) return;
      ensureUtilityButtons();
      showRoomView();
      $('#roomCodeText').textContent = state.room.code;
      $('#clientIdText').textContent = state.clientId ? state.clientId.slice(0, 8) : '-';
      $('#memberCountText').textContent = String(state.room.memberCount || 0);

      const picker = $('#colorPicker');
      picker.innerHTML = '';
      const taken = state.room.colors || {};
      Object.entries(COLORS).forEach(([key, meta]) => {
        const holder = taken[key];
        const btn = document.createElement('button');
        btn.className = 'color-btn';
        if(state.me.color === key) btn.classList.add('selected');
        if(holder && holder !== state.clientId) btn.classList.add('taken');
        btn.style.background = meta.hex;
        btn.title = holder && holder !== state.clientId ? `${meta.label}（已被選取）` : meta.label;
        btn.disabled = !!holder && holder !== state.clientId;
        btn.onclick = () => send('select_color', { roomCode: state.roomCode, color: key });
        picker.appendChild(btn);
      });

      const legend = $('#memberLegend');
      legend.innerHTML = '';
      const members = state.room.members || [];
      members.forEach(m => {
        const item = document.createElement('div');
        item.className = 'legend-item';
        const dot = document.createElement('span');
        dot.className = 'dot';
        dot.style.background = m.color ? COLORS[m.color].hex : '#777';
        const text = document.createElement('span');
        text.textContent = `${getDisplayName(m)}${m.clientId === state.clientId ? ' (你)' : ''}${m.color ? ` · ${COLORS[m.color].label}` : ' · 未選色'}`;
        text.style.display = 'inline-flex';
        text.style.alignItems = 'center';
        text.style.justifyContent = 'center';
        item.append(dot, text);
        legend.appendChild(item);
      });

      renderBoard();
      renderFloatingWindow();
    }

    function renderBoard(){
      const shared = state.room?.board || [];
      const publicMarks = state.room?.publicMarks || {};
      const wrongMap = getWrongSet();
      boardBody.innerHTML = '';
      for(let floor = 10; floor >= 1; floor--){
        const tr = document.createElement('tr');
        const floorTd = document.createElement('td');
        floorTd.className = 'floor-cell';
        floorTd.textContent = `${floor}`;
        tr.appendChild(floorTd);

        for(let door = 1; door <= 4; door++){
          const td = document.createElement('td');
          td.className = 'pick';
          const floorData = shared[floor - 1] || {};
          let occupantColor = null;
          let occupantId = null;
          Object.entries(floorData).forEach(([color, pickDoor]) => {
            if(pickDoor === door){
              occupantColor = color;
              occupantId = state.room.members?.find(m => m.color === color)?.clientId || '';
            }
          });

          const wrongKey = `${floor}-${door}`;
          const publicMarkMembers = (publicMarks[wrongKey] || [])
            .map(id => getMemberById(id))
            .filter(Boolean);

          if(occupantColor){
            const marker = document.createElement('div');
            marker.className = 'marker';
            marker.textContent = '　　　';
            marker.style.opacity = '0.0';
            td.style.background = occupantId === state.clientId ? COLORS[occupantColor].hex : COLORS2[occupantColor].hex;
            td.appendChild(marker);
          } else if(wrongMap[wrongKey]) {
            td.classList.add('private-wrong');
            const sub = document.createElement('div');
            sub.className = 'submark';
            sub.textContent = '　　　';
            td.appendChild(sub);
          } else {
            const sub = document.createElement('div');
            sub.className = 'submark';
            sub.textContent = '　　　';
            td.appendChild(sub);
          }

          if(publicMarkMembers.length){
            td.classList.add('has-public-mark');
            td.title = `Public XX: ${publicMarkMembers.map(member => getDisplayName(member)).join(', ')}`;
            const badge = document.createElement('div');
            badge.className = 'public-xx-badge';
            badge.textContent = publicMarkMembers.length > 1 ? `XX ${publicMarkMembers.length}` : 'XX';
            td.appendChild(badge);
          }

          bindCellInteractions(td, floor, door);
          tr.appendChild(td);
        }
        boardBody.appendChild(tr);
      }
    }

    function togglePrivateWrong(floor, door){
      const wrongMap = getWrongSet();
      const key = `${floor}-${door}`;
      if(wrongMap[key]) delete wrongMap[key];
      else wrongMap[key] = true;
      persistLocalWrong();
      renderBoard();
    }

    function togglePublicMark(floor, door){
      send('toggle_public_mark', { roomCode: state.roomCode, floor, door });
    }

    function handleSharedPick(floor, door){
      if(!state.me.color){
        showToast('請先選擇顏色');
        return;
      }
      send('toggle_shared', { roomCode: state.roomCode, floor, door });
    }

    function bindCellInteractions(td, floor, door){
      let longPressTimer = null;
      let longPressTriggered = false;
      let pointerDown = false;
      const longPressMs = 450;

      const clearLongPress = () => {
        pointerDown = false;
        if(longPressTimer){
          clearTimeout(longPressTimer);
          longPressTimer = null;
        }
      };

      td.onclick = () => {
        if(longPressTriggered){
          longPressTriggered = false;
          return;
        }
        handleSharedPick(floor, door);
      };

      td.oncontextmenu = (event) => {
        event.preventDefault();
        if(event.shiftKey){
          togglePrivateWrong(floor, door);
          return;
        }
        togglePublicMark(floor, door);
      };

      td.addEventListener('pointerdown', (event) => {
        if(event.pointerType !== 'touch') return;
        pointerDown = true;
        longPressTriggered = false;
        longPressTimer = setTimeout(() => {
          if(!pointerDown) return;
          longPressTriggered = true;
          togglePublicMark(floor, door);
        }, longPressMs);
      });

      td.addEventListener('pointerup', clearLongPress);
      td.addEventListener('pointercancel', clearLongPress);
      td.addEventListener('pointerleave', clearLongPress);
    }

    async function copyRoomInfo(){
      const directLink = buildShareLink();
      const info = [
        `Code: ${state.roomCode}`,
        `Password: ${state.roomPassword || '(none)'}`,
        `Link: ${directLink}`
      ].join('\n');
      try{
        await navigator.clipboard.writeText(info);
        showToast('已複製可直接進房的連結');
      }catch{
        showToast('複製失敗');
      }
    }

    function applyHashAutoJoin(){
      const m = location.hash.match(/^#\/(.+)$/);
      if(!m) return;
      const code = decodeURIComponent(m[1]);
      const params = new URLSearchParams(location.search);
      const pwd = params.get('pwd') || '';
      $('#joinRoomCode').value = code;
      $('#joinRoomPassword').value = pwd;

      const autojoin = params.get('autojoin') === '1';
      if(autojoin && !state.autoJoinAttempted){
        state.autoJoinAttempted = true;
        setTimeout(() => joinOrCreate('join'), 80);
      }
    }

    window.addEventListener('keydown', (e) => {
      if((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === ','){
        const next = prompt('輸入後端 HTTP/HTTPS 網址', currentBackendHttpUrl() || '');
        if(next){
          saveWsUrl(next.trim());
          showToast('已更新後端網址');
        }
      }
    });

    const handleClearShared = () => {
      if (confirm('確認清除共享標記？')) {
        send('clear_shared', { roomCode: state.roomCode });
      }
    };

    ensureUtilityButtons();
    ensureFloatingWindow();

    $('#createRoomBtn').onclick = () => joinOrCreate('create');
    $('#joinRoomBtn').onclick = () => joinOrCreate('join');
    $('#randomRoomBtn').onclick = () => $('#createRoomCode').value = randomRoomCode();
    $('#copyRoomBtn').onclick = copyRoomInfo;
    $('#clearSharedBtn').onclick = handleClearShared;
    $('#clearSharedBtn2').onclick = handleClearShared;
    $('#leaveRoomBtn').onclick = () => leaveRoomLocal(true);
    $('#renameBtn').onclick = promptRename;
    $('#floatingBtn').onclick = () => toggleFloatingWindow();

    if($('#saveBackendBtn')){
      $('#saveBackendBtn').onclick = () => {
        saveWsUrl($('#backendUrl').value);
        showToast('已儲存後端網址');
        if(state.ws && (state.ws.readyState === WebSocket.OPEN || state.ws.readyState === WebSocket.CONNECTING)){
          state.ws.close();
        }
      };
    }

    if($('#resetBackendBtn')){
      $('#resetBackendBtn').onclick = () => {
        saveWsUrl('');
        showToast('已重設後端網址');
      };
    }

    renderBackendSettings();
    applyHashAutoJoin();
    if($('#joinRoomCode').value && new URLSearchParams(location.search).get('autojoin') !== '1'){
      showToast('已從網址帶入房號');
    }
  </script>
</body>
</html>
